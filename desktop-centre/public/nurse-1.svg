<svg viewBox="0 0 200 280" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#f3f4f6" opacity="0.5"/>

  <!-- Head -->
  <circle cx="100" cy="60" r="28" fill="#d4a574"/>

  <!-- Smile -->
  <path d="M 90 65 Q 100 72 110 65" stroke="#8b6f47" stroke-width="1.5" fill="none"/>

  <!-- Eyes -->
  <circle cx="93" cy="58" r="2" fill="#3d2817"/>
  <circle cx="107" cy="58" r="2" fill="#3d2817"/>

  <!-- Hair -->
  <ellipse cx="100" cy="42" rx="30" ry="22" fill="#3d2817"/>
  <path d="M 70 45 Q 70 25 100 20 Q 130 25 130 45" fill="#3d2817"/>

  <!-- Neck -->
  <rect x="96" y="85" width="8" height="8" fill="#d4a574"/>

  <!-- Nurse uniform - white top -->
  <path d="M 75 93 L 75 160 Q 75 175 85 180 L 115 180 Q 125 175 125 160 L 125 93 Z" fill="white" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Stethoscope around neck -->
  <path d="M 88 110 Q 100 105 112 110" stroke="#ef4444" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Red cross emblem -->
  <rect x="95" y="125" width="10" height="10" fill="#ef4444"/>
  <rect x="98" y="122" width="4" height="16" fill="white"/>
  <rect x="92" y="128" width="16" height="4" fill="white"/>

  <!-- Left arm -->
  <path d="M 75 105 L 55 130" stroke="#d4a574" stroke-width="6" fill="none" stroke-linecap="round"/>

  <!-- Right arm -->
  <path d="M 125 105 L 145 130" stroke="#d4a574" stroke-width="6" fill="none" stroke-linecap="round"/>

  <!-- Hands -->
  <circle cx="52" cy="135" r="4" fill="#d4a574"/>
  <circle cx="148" cy="135" r="4" fill="#d4a574"/>

  <!-- Skirt - light blue -->
  <path d="M 75 160 L 65 180 L 65 220 Q 65 235 75 240 L 125 240 Q 135 235 135 220 L 135 180 L 125 160 Z" fill="#e0f2fe"/>

  <!-- Belt -->
  <rect x="70" y="155" width="60" height="3" fill="#94a3b8"/>

  <!-- Shoes -->
  <ellipse cx="80" cy="245" rx="8" ry="6" fill="#3d2817"/>
  <ellipse cx="120" cy="245" rx="8" ry="6" fill="#3d2817"/>

  <!-- Badge -->
  <rect x="85" y="135" width="30" height="20" rx="2" fill="#fbbf24" stroke="#f59e0b" stroke-width="1"/>
  <text x="100" y="149" font-size="10" text-anchor="middle" fill="#78350f" font-weight="bold">Dr.</text>
</svg>
