<svg viewBox="0 0 200 280" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#f3f4f6" opacity="0.5"/>

  <!-- Head -->
  <circle cx="100" cy="65" r="30" fill="#c1956c"/>

  <!-- Expression - happy -->
  <circle cx="91" cy="62" r="2.5" fill="#2c1810"/>
  <circle cx="109" cy="62" r="2.5" fill="#2c1810"/>
  <path d="M 88 70 Q 100 76 112 70" stroke="#8b6f47" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Hair - braids style -->
  <g fill="#2c1810">
    <path d="M 70 50 Q 65 40 75 35 Q 80 32 100 28 Q 120 32 125 35 Q 135 40 130 50 Z"/>
    <!-- Braids -->
    <rect x="75" y="30" width="2" height="40" rx="1"/>
    <rect x="85" y="28" width="2" height="45" rx="1"/>
    <rect x="95" y="27" width="2" height="48" rx="1"/>
    <rect x="105" y="28" width="2" height="45" rx="1"/>
    <rect x="115" y="30" width="2" height="40" rx="1"/>
  </g>

  <!-- Neck -->
  <rect x="96" y="92" width="8" height="10" fill="#c1956c"/>

  <!-- Uniform - colored scrubs (teal) -->
  <path d="M 70 102 L 68 180 Q 68 200 80 210 L 120 210 Q 132 200 132 180 L 130 102 Z" fill="#14b8a6" stroke="#0d9488" stroke-width="1"/>

  <!-- White collar -->
  <path d="M 85 102 L 90 110 L 110 110 L 115 102 Z" fill="white"/>

  <!-- Stethoscope -->
  <circle cx="100" cy="115" r="8" fill="none" stroke="#ec4899" stroke-width="2"/>
  <path d="M 92 115 L 90 130" stroke="#ec4899" stroke-width="2" stroke-linecap="round"/>
  <path d="M 108 115 L 110 130" stroke="#ec4899" stroke-width="2" stroke-linecap="round"/>

  <!-- Name tag -->
  <rect x="78" y="140" width="44" height="22" rx="3" fill="white" stroke="#cbd5e1" stroke-width="1"/>
  <text x="100" y="149" font-size="9" text-anchor="middle" fill="#0d9488" font-weight="bold">Infirmière</text>
  <text x="100" y="160" font-size="7" text-anchor="middle" fill="#64748b">Centre VitaSang</text>

  <!-- Left arm holding clipboard -->
  <path d="M 70 110 L 45 125" stroke="#c1956c" stroke-width="7" fill="none" stroke-linecap="round"/>
  <rect x="35" y="120" width="20" height="28" rx="2" fill="white" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="37" y1="128" x2="53" y2="128" stroke="#cbd5e1" stroke-width="0.5"/>
  <line x1="37" y1="136" x2="53" y2="136" stroke="#cbd5e1" stroke-width="0.5"/>
  <circle cx="38" cy="122" r="1.5" fill="#ef4444"/>

  <!-- Right arm -->
  <path d="M 130 110 L 155" stroke="#c1956c" stroke-width="7" fill="none" stroke-linecap="round"/>

  <!-- Hands -->
  <circle cx="42" cy="130" r="5" fill="#c1956c"/>
  <circle cx="157" cy="110" r="5" fill="#c1956c"/>

  <!-- Pants - white -->
  <path d="M 80 190 L 75 210 L 75 245 Q 75 255 82 258 L 98 258 L 98 210 L 102 210 L 102 258 L 118 258 Q 125 255 125 245 L 125 210 L 120 190 Z" fill="white"/>

  <!-- Shoes -->
  <ellipse cx="88" cy="260" rx="7" ry="5" fill="#3d2817"/>
  <ellipse cx="112" cy="260" rx="7" ry="5" fill="#3d2817"/>

  <!-- Medical cross pattern on uniform -->
  <g fill="#dc2626" opacity="0.8">
    <rect x="96" y="155" width="8" height="8"/>
    <rect x="99" y="152" width="2" height="14"/>
    <rect x="93" y="158" width="14" height="2"/>
  </g>
</svg>
