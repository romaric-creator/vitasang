name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"
          cache: "npm"

      - name: Initialize Gemini
        run: .gemini/scripts/init.sh

      - name: Health Check
        run: .gemini/scripts/health-check.sh

      - name: Lint & Format Check
        run: |
          .gemini/scripts/lint.sh
          .gemini/scripts/format.sh --check

      - name: Run Tests
        run: .gemini/scripts/test.sh coverage

      - name: Audit & Security
        run: |
          .gemini/scripts/audit.sh --fix
          .gemini/scripts/security-scan.sh

      - name: Performance Benchmark
        run: .gemini/scripts/benchmark.sh api
        continue-on-error: true

      - name: Upload Coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/coverage-final.json
        continue-on-error: true

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: quality
    if: github.ref == 'refs/heads/develop'

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Deploy to Staging
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
        run: .gemini/scripts/deploy.sh staging

      - name: Health Check
        run: .gemini/scripts/health-check.sh
        continue-on-error: true

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: quality
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Pre-flight Checks
        run: |
          .gemini/scripts/health-check.sh
          .gemini/scripts/audit.sh --fix
          .gemini/scripts/security-scan.sh

      - name: Deploy to Production
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
        run: .gemini/scripts/deploy.sh prod

      - name: Post-deployment Stats
        run: .gemini/scripts/stats.sh --detailed
        continue-on-error: true

  notify:
    name: Notifications
    runs-on: ubuntu-latest
    needs: [quality]
    if: always()

    steps:
      - name: Notify Results
        run: |
          echo "✅ CI Pipeline completed"
          echo "Status: ${{ job.status }}"
        continue-on-error: true
