<!DOCTYPE html>

<html lang="fr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "error-container": "#ffdad6",
                        "on-secondary-fixed-variant": "#005228",
                        "on-secondary": "#ffffff",
                        "on-background": "#091d2e",
                        "on-error-container": "#93000a",
                        "tertiary-fixed-dim": "#ffb783",
                        "secondary-fixed": "#7efba4",
                        "surface-variant": "#d1e4fb",
                        "error": "#ba1a1a",
                        "secondary-container": "#7bf8a1",
                        "surface-dim": "#c9dcf3",
                        "surface-container": "#e3efff",
                        "inverse-on-surface": "#e8f2ff",
                        "surface-tint": "#b02d21",
                        "on-error": "#ffffff",
                        "on-primary-container": "#ffe5e1",
                        "inverse-surface": "#203243",
                        "tertiary-fixed": "#ffdcc5",
                        "on-tertiary-fixed": "#301400",
                        "outline": "#8d706c",
                        "tertiary": "#814000",
                        "surface-bright": "#f7f9ff",
                        "outline-variant": "#e1bfb9",
                        "on-primary-fixed": "#410000",
                        "surface-container-lowest": "#ffffff",
                        "tertiary-container": "#a55400",
                        "on-primary": "#ffffff",
                        "on-primary-fixed-variant": "#8e130c",
                        "background": "#f7f9ff",
                        "on-secondary-fixed": "#00210c",
                        "surface": "#f7f9ff",
                        "on-surface": "#091d2e",
                        "secondary-fixed-dim": "#61de8a",
                        "on-tertiary": "#ffffff",
                        "secondary": "#006d37",
                        "on-surface-variant": "#59413d",
                        "on-tertiary-fixed-variant": "#713700",
                        "surface-container-highest": "#d1e4fb",
                        "primary-fixed": "#ffdad5",
                        "primary": "#9e2016",
                        "surface-container-low": "#edf4ff",
                        "on-secondary-container": "#007239",
                        "surface-container-high": "#d9eaff",
                        "primary-fixed-dim": "#ffb4a9",
                        "primary-container": "#c0392b",
                        "on-tertiary-container": "#ffe6d8",
                        "inverse-primary": "#ffb4a9"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "stack-sm": "12px",
                        "gutter": "16px",
                        "container-margin": "20px",
                        "base": "8px",
                        "stack-lg": "32px",
                        "stack-md": "24px"
                    },
                    "fontFamily": {
                        "screen-title": ["Inter"],
                        "label-sm": ["Inter"],
                        "body-md": ["Inter"],
                        "section-title": ["Inter"],
                        "button-text": ["Inter"]
                    },
                    "fontSize": {
                        "screen-title": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "label-sm": ["12px", {"lineHeight": "16px", "fontWeight": "500"}],
                        "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "section-title": ["18px", {"lineHeight": "24px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "button-text": ["16px", {"lineHeight": "24px", "fontWeight": "600"}]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { font-family: 'Inter', sans-serif; background-color: #F5F5F5; }
        .custom-scrollbar::-webkit-scrollbar { width: 0px; background: transparent; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface-container-low text-on-surface min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="flex items-center justify-between px-container-margin w-full fixed top-0 z-50 bg-surface-container-lowest h-[56px] border-b border-surface-container">
<button class="flex items-center justify-center w-10 h-10 active:opacity-70 transition-all text-primary">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-screen-title text-screen-title text-primary flex-1 text-center pr-10">Nouvelle alerte de don</h1>
</header>
<!-- Scrollable Content -->
<main class="mt-[56px] mb-[120px] flex-1 overflow-y-auto px-container-margin py-stack-md custom-scrollbar">
<form class="flex flex-col gap-stack-md">
<!-- Blood Group Selection -->
<section class="flex flex-col gap-stack-sm">
<label class="font-section-title text-section-title text-on-surface">Groupe sanguin nécessaire *</label>
<div class="grid grid-cols-4 gap-2">
<button class="h-14 flex items-center justify-center rounded-xl bg-surface-container-highest text-on-surface-variant font-bold border border-transparent" type="button">A+</button>
<button class="h-14 flex items-center justify-center rounded-xl bg-surface-container-highest text-on-surface-variant font-bold border border-transparent" type="button">A-</button>
<button class="h-14 flex items-center justify-center rounded-xl bg-surface-container-highest text-on-surface-variant font-bold border border-transparent" type="button">B+</button>
<button class="h-14 flex items-center justify-center rounded-xl bg-surface-container-highest text-on-surface-variant font-bold border border-transparent" type="button">B-</button>
<button class="h-14 flex items-center justify-center rounded-xl bg-surface-container-highest text-on-surface-variant font-bold border border-transparent" type="button">AB+</button>
<button class="h-14 flex items-center justify-center rounded-xl bg-surface-container-highest text-on-surface-variant font-bold border border-transparent" type="button">AB-</button>
<!-- Selected State -->
<button class="h-14 flex items-center justify-center rounded-xl bg-primary-container text-on-primary font-bold shadow-md" type="button">O+</button>
<button class="h-14 flex items-center justify-center rounded-xl bg-surface-container-highest text-on-surface-variant font-bold border border-transparent" type="button">O-</button>
</div>
</section>
<!-- Urgency Level -->
<section class="flex flex-col gap-stack-sm">
<label class="font-section-title text-section-title text-on-surface">Niveau d'urgence *</label>
<div class="flex gap-2">
<button class="flex-1 py-3 rounded-full bg-secondary/15 text-secondary font-bold text-[10px] border border-transparent" type="button">NORMAL</button>
<!-- Default Selected State -->
<button class="flex-1 py-3 rounded-full bg-tertiary/15 text-tertiary font-bold text-[10px] border-2 border-tertiary" type="button">URGENT</button>
<button class="flex-1 py-3 rounded-full bg-error/15 text-error font-bold text-[10px] border border-transparent" type="button">TRES_URGENT</button>
</div>
</section>
<!-- Location -->
<section class="flex flex-col gap-stack-sm">
<label class="font-section-title text-section-title text-on-surface">Lieu *</label>
<div class="flex flex-col gap-2">
<div class="relative">
<input class="w-full h-12 px-4 rounded-lg border border-outline-variant bg-surface-container-lowest focus:border-primary-container focus:ring-0 outline-none font-body-md text-on-surface" placeholder="Ex: Hôpital Général de Douala" type="text"/>
</div>
<button class="flex items-center justify-center gap-2 text-primary font-semibold text-label-sm self-start px-4 py-2 bg-primary/5 rounded-full" type="button">
<span class="material-symbols-outlined text-[18px]" data-icon="location_on">location_on</span>
                        Utiliser ma position
                    </button>
</div>
</section>
<!-- Quantity -->
<section class="flex flex-col gap-stack-sm p-4 bg-white rounded-2xl shadow-[0px_4px_12px_rgba(44,62,80,0.08)]">
<label class="font-section-title text-section-title text-on-surface text-center">Quantité de poches requises</label>
<div class="flex items-center justify-center gap-8 py-2">
<button class="w-12 h-12 flex items-center justify-center rounded-full border border-outline-variant text-on-surface-variant active:bg-surface-container" type="button">
<span class="material-symbols-outlined" data-icon="remove">remove</span>
</button>
<span class="font-screen-title text-screen-title text-primary">1</span>
<button class="w-12 h-12 flex items-center justify-center rounded-full border border-outline-variant text-on-surface-variant active:bg-surface-container" type="button">
<span class="material-symbols-outlined" data-icon="add">add</span>
</button>
</div>
</section>
<!-- Search Radius -->
<section class="flex flex-col gap-stack-sm">
<div class="flex justify-between items-center">
<label class="font-section-title text-section-title text-on-surface">Rayon de recherche</label>
<span class="font-bold text-primary">10 km</span>
</div>
<input class="w-full h-2 bg-surface-container-highest rounded-lg appearance-none cursor-pointer accent-primary-container" max="50" min="1" type="range" value="10"/>
<div class="flex justify-between text-label-sm text-on-surface-variant">
<span>1 km</span>
<span>50 km</span>
</div>
</section>
<!-- Description -->
<section class="flex flex-col gap-stack-sm">
<label class="font-section-title text-section-title text-on-surface">Description</label>
<textarea class="w-full p-4 rounded-lg border border-outline-variant bg-surface-container-lowest focus:border-primary-container focus:ring-0 outline-none font-body-md text-on-surface resize-none" placeholder="Contexte ou informations supplémentaires..." rows="4"></textarea>
</section>
</form>
</main>
<!-- Footer -->
<footer class="fixed bottom-0 left-0 w-full bg-surface-container-lowest px-container-margin pt-4 pb-8 border-t border-surface-container flex flex-col gap-2">
<button class="w-full h-[56px] bg-primary-container text-white rounded-xl font-button-text text-button-text flex items-center justify-center gap-2 active:scale-95 transition-transform">
<span class="material-symbols-outlined" data-icon="notifications_active">notifications_active</span>
            🚨 Lancer l'alerte
        </button>
<p class="text-center font-label-sm text-label-sm text-on-surface-variant">
            Les donneurs compatibles seront notifiés instantanément
        </p>
</footer>
<!-- Decorative background element for medical feel -->
<div class="fixed top-0 right-0 -z-10 opacity-5">
<span class="material-symbols-outlined text-[300px] text-primary" data-icon="water_drop">water_drop</span>
</div>
</body></html>
