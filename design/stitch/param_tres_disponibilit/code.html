<!DOCTYPE html>

<html class="light" lang="fr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f7f9ff;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-primary-fixed": "#410000",
                        "on-secondary-container": "#007239",
                        "surface": "#f7f9ff",
                        "primary": "#9e2016",
                        "outline-variant": "#e1bfb9",
                        "on-tertiary": "#ffffff",
                        "surface-variant": "#d1e4fb",
                        "primary-container": "#c0392b",
                        "tertiary-fixed-dim": "#ffb783",
                        "on-background": "#091d2e",
                        "inverse-surface": "#203243",
                        "inverse-primary": "#ffb4a9",
                        "tertiary-fixed": "#ffdcc5",
                        "surface-container": "#e3efff",
                        "on-error-container": "#93000a",
                        "secondary-fixed": "#7efba4",
                        "secondary-container": "#7bf8a1",
                        "surface-bright": "#f7f9ff",
                        "surface-tint": "#b02d21",
                        "on-tertiary-fixed-variant": "#713700",
                        "on-secondary-fixed-variant": "#005228",
                        "outline": "#8d706c",
                        "on-primary-container": "#ffe5e1",
                        "surface-container-lowest": "#ffffff",
                        "tertiary-container": "#a55400",
                        "on-tertiary-fixed": "#301400",
                        "on-surface": "#091d2e",
                        "surface-container-highest": "#d1e4fb",
                        "error-container": "#ffdad6",
                        "tertiary": "#814000",
                        "primary-fixed": "#ffdad5",
                        "on-primary-fixed-variant": "#8e130c",
                        "error": "#ba1a1a",
                        "background": "#f7f9ff",
                        "on-surface-variant": "#59413d",
                        "primary-fixed-dim": "#ffb4a9",
                        "on-secondary-fixed": "#00210c",
                        "on-secondary": "#ffffff",
                        "secondary-fixed-dim": "#61de8a",
                        "on-primary": "#ffffff",
                        "surface-container-low": "#edf4ff",
                        "on-tertiary-container": "#ffe6d8",
                        "surface-container-high": "#d9eaff",
                        "secondary": "#006d37",
                        "surface-dim": "#c9dcf3",
                        "on-error": "#ffffff",
                        "inverse-on-surface": "#e8f2ff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "stack-lg": "32px",
                        "stack-sm": "12px",
                        "stack-md": "24px",
                        "container-margin": "20px",
                        "gutter": "16px",
                        "base": "8px"
                    },
                    "fontFamily": {
                        "button-text": ["Inter"],
                        "screen-title": ["Inter"],
                        "label-sm": ["Inter"],
                        "body-md": ["Inter"],
                        "section-title": ["Inter"]
                    },
                    "fontSize": {
                        "button-text": ["16px", {"lineHeight": "24px", "fontWeight": "600"}],
                        "screen-title": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "label-sm": ["12px", {"lineHeight": "16px", "fontWeight": "500"}],
                        "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "section-title": ["18px", {"lineHeight": "24px", "letterSpacing": "-0.01em", "fontWeight": "600"}]
                    }
                },
            },
        }
    </script>
</head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col">
<!-- Top App Bar -->
<header class="flex items-center justify-between px-container-margin w-full fixed top-0 z-50 bg-surface-container-lowest border-b border-surface-container h-[56px]">
<div class="flex items-center gap-4">
<button class="active:opacity-70 transition-all text-primary">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-screen-title text-screen-title text-primary">Ma disponibilité</h1>
</div>
</header>
<!-- Content Canvas -->
<main class="flex-1 mt-[56px] mb-[64px] px-container-margin py-stack-md overflow-y-auto">
<!-- Status Card (Indisponible) -->
<section class="mb-stack-md">
<div class="bg-[#FFF4ED] p-4 rounded-xl flex items-center gap-4 border border-[#FFDCC5]">
<div class="w-10 h-10 rounded-full bg-[#FFDCC5] flex items-center justify-center text-[#E67E22]">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">pause_circle</span>
</div>
<div>
<p class="font-section-title text-[#E67E22]">Indisponible</p>
<p class="text-body-md text-[#713700]">Vous êtes marqué indisponible</p>
</div>
</div>
</section>
<!-- Main Toggle Section -->
<section class="bg-white p-4 rounded-2xl shadow-[0px_4px_12px_rgba(44,62,80,0.08)] mb-stack-md">
<div class="flex items-center justify-between mb-2">
<span class="text-[16px] font-bold text-on-surface">Disponible pour donner</span>
<div class="relative inline-flex items-center cursor-pointer">
<div class="w-12 h-6 bg-gray-300 rounded-full transition-colors duration-200 ease-in-out"></div>
<div class="absolute left-1 top-1 bg-white w-4 h-4 rounded-full transition-transform duration-200 ease-in-out"></div>
</div>
</div>
<p class="font-body-md text-on-surface-variant">Les alertes compatibles vous seront envoyées</p>
</section>
<!-- Conditional Section (SI INDISPONIBLE) -->
<section class="space-y-stack-md">
<!-- Reason Chips -->
<div class="space-y-stack-sm">
<label class="font-section-title text-on-surface">Raison de l'indisponibilité</label>
<div class="flex flex-wrap gap-2">
<div class="px-4 py-2 rounded-full bg-primary-container/10 text-primary-container font-label-sm border border-primary-container/20">
                        Maladie
                    </div>
<div class="px-4 py-2 rounded-full bg-primary-container/10 text-primary-container font-label-sm border border-primary-container/20">
                        Voyage
                    </div>
<div class="px-4 py-2 rounded-full bg-surface-container-low text-on-surface-variant font-label-sm border border-outline-variant">
                        Allaitement
                    </div>
<div class="px-4 py-2 rounded-full bg-surface-container-low text-on-surface-variant font-label-sm border border-outline-variant">
                        Post-opératoire
                    </div>
<div class="px-4 py-2 rounded-full bg-surface-container-low text-on-surface-variant font-label-sm border border-outline-variant">
                        Autre
                    </div>
</div>
</div>
<!-- Date Picker -->
<div class="space-y-stack-sm">
<label class="font-section-title text-on-surface">Date de retour estimée</label>
<div class="flex items-center justify-between w-full h-[48px] px-4 border border-outline-variant rounded-lg bg-white active:border-primary transition-colors">
<span class="text-body-md text-on-surface-variant">Sélectionner une date</span>
<span class="material-symbols-outlined text-primary">calendar_month</span>
</div>
</div>
<!-- Localisation Section -->
<div class="bg-white p-4 rounded-2xl shadow-[0px_4px_12px_rgba(44,62,80,0.08)] space-y-4">
<label class="font-section-title text-on-surface">LOCALISATION</label>
<div class="relative w-full h-32 rounded-xl overflow-hidden bg-surface-container">
<img alt="Map placeholder" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida/ADBb0uj0I8u5g01l5WMyZRf-qorjnGhiImSJC6gNstNpIHxbpc-oxk1le-yiVHnyRzFjTARk-PmCqRbagpapB4sw1iHiG_tKN8esfE1BSzxzQSwDFNDKijPoo9GGx55Atj1tr0yvK_vmLxx-c2STXSWFMFB9J77wSiEew1hTskbiaqwZctb2ypjPNewaKaws240SyvqM4FioJTukOiNQS5v_ShLS9KZkf9D5Of2nQgBRkKX4utgdoE9tpiCWLV2z"/>
<div class="absolute inset-0 bg-gradient-to-t from-black/20 to-transparent"></div>
</div>
<div class="flex items-center gap-2 text-on-surface-variant">
<span class="material-symbols-outlined text-primary">location_on</span>
<span class="font-body-md">Ma position actuelle : <strong>Douala, Cameroun</strong></span>
</div>
<button class="w-full h-[52px] border-2 border-primary-container text-primary-container rounded-xl font-button-text hover:bg-primary-container/5 active:scale-95 transition-all">
                    Mettre à jour ma position
                </button>
</div>
</section>
<!-- Main Action -->
<div class="mt-stack-lg">
<button class="w-full h-[52px] bg-primary-container text-white rounded-xl font-button-text shadow-lg active:scale-95 transition-all">
                Enregistrer
            </button>
</div>
</main>
<!-- Bottom Navigation Bar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center bg-surface-container-lowest border-t border-surface-container h-[64px] px-gutter pb-safe">
<button class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-container-low transition-colors active:scale-95">
<span class="material-symbols-outlined">home</span>
<span class="font-label-sm text-label-sm">Accueil</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-container-low transition-colors active:scale-95">
<span class="material-symbols-outlined">map</span>
<span class="font-label-sm text-label-sm">Carte</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-container-low transition-colors active:scale-95">
<span class="material-symbols-outlined">notifications</span>
<span class="font-label-sm text-label-sm">Alertes</span>
</button>
<button class="flex flex-col items-center justify-center text-primary font-semibold hover:bg-surface-container-low transition-colors active:scale-95">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">person</span>
<span class="font-label-sm text-label-sm">Profil</span>
</button>
</nav>
</body></html>
