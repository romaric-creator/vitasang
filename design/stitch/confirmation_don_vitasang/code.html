<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 48;
        }
        .confetti-pattern {
            background-image: radial-gradient(#c0392b 1px, transparent 1px), radial-gradient(#27ae60 1px, transparent 1px), radial-gradient(#f1c40f 1px, transparent 1px);
            background-size: 24px 24px;
            background-position: 0 0, 12px 12px, 8px 16px;
            opacity: 0.1;
        }
        @keyframes heart-pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        .animate-pulse-heart {
            animation: heart-pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-surface-container-lowest font-body-md text-on-surface">
<!-- Top Navigation Anchor (Suppressed Shell as per Transactional rule, but showing Brand Identity) -->
<header class="flex items-center justify-center px-container-margin w-full fixed top-0 z-50 bg-surface-container-lowest h-[56px]">
<h1 class="font-screen-title text-screen-title text-primary">VitaSang</h1>
</header>
<!-- Main Canvas -->
<main class="min-h-screen flex items-center justify-center px-container-margin pt-[56px] relative overflow-hidden">
<!-- Background Confetti Layer -->
<div class="absolute inset-0 confetti-pattern pointer-events-none"></div>
<!-- Success Modal / Card -->
<div class="relative z-10 w-full max-w-[400px] bg-surface-container-lowest rounded-card p-stack-lg flex flex-col items-center text-center shadow-[0px_4px_12px_rgba(44,62,80,0.08)]">
<!-- Pulsing Heart Icon -->
<div class="w-24 h-24 mb-stack-md flex items-center justify-center bg-primary-container/10 rounded-full animate-pulse-heart">
<span class="material-symbols-outlined text-primary text-[80px]" style="font-variation-settings: 'FILL' 1;">
                    favorite
                </span>
</div>
<!-- Title -->
<h2 class="font-screen-title text-screen-title text-primary-container mb-base">
                Vous avez sauvé une vie ! 🩸
            </h2>
<!-- Message -->
<p class="font-body-md text-on-surface-variant mb-stack-lg">
                Votre don a été enregistré dans votre historique
            </p>
<!-- Stats Section (Bento style highlight) -->
<div class="grid grid-cols-2 gap-gutter w-full mb-stack-lg">
<div class="bg-surface-container-low p-stack-sm rounded-xl flex flex-col items-center justify-center border border-outline-variant/30">
<span class="text-secondary font-bold text-lg">+1 Don</span>
<span class="font-label-sm text-on-surface-variant uppercase tracking-wider">Aujourd'hui</span>
</div>
<div class="bg-surface-container-low p-stack-sm rounded-xl flex flex-col items-center justify-center border border-outline-variant/30">
<span class="text-primary font-bold text-lg">4 dons</span>
<span class="font-label-sm text-on-surface-variant uppercase tracking-wider">Total</span>
</div>
</div>
<!-- Primary Action -->
<button class="w-full h-[52px] bg-primary-container text-on-primary font-button-text text-button-text rounded-xl active:opacity-70 transition-all shadow-lg shadow-primary-container/20">
                Retour à l'accueil
            </button>
<!-- Secondary Decorative Elements -->
<div class="mt-stack-lg flex items-center gap-base opacity-40">
<span class="material-symbols-outlined text-sm">verified</span>
<span class="font-label-sm">Don sécurisé et authentifié</span>
</div>
</div>
<!-- Background Image for context (Subtle atmosphere) -->
<div class="fixed inset-0 -z-10 bg-gradient-to-br from-white via-surface-container-low to-white"></div>
</main>
<!-- Bottom Navigation Suppressed for Transactional/Success Flow as per Shell Visibility Rule -->
